name: Claim review
description: Challenge, strengthen, or refine a specific claim.
title: "Claim review: "
labels: ["claim-review"]
body:
  - type: input
    id: claim
    attributes:
      label: Claim ID
      description: Example: C1, D1, Q1, R1, B1, S1
      placeholder: "C1"
    validations:
      required: true
  - type: textarea
    id: assessment
    attributes:
      label: Assessment
      description: What is right, weak, unclear, or wrong?
    validations:
      required: true
  - type: textarea
    id: failure
    attributes:
      label: Failure mode
      description: How could this claim fail or need weakening?
  - type: textarea
    id: suggested_revision
    attributes:
      label: Suggested revision
      description: Propose a stronger, weaker, or clearer version.
