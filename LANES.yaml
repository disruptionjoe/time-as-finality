    not source-circling."
  - "(4) TaF is a re-verified SUPPLIER of the finality/geometry leg to Dynamic Unity (the integrator); TaF
    never seeds or hardens DU's assembly. Generalizes the established GU sigma=w1 supplier model. The GU sigma
    receptacle is proposal-grade INPUT, not a dependency."
